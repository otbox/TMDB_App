version: '3.9'

services:
  backend:
    build: ./backend
    container_name: tmdb_backend
    ports:
      - "5000:5000"
    volumes:
      - db_data:/app/instance 
    environment:
      - FLASK_ENV=production

  frontend:
    build: ./frontend
    container_name: tmdb_frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    environment:
      - VITE_TMDB_API_KEY=your-tmdb-api-key-here
      - VITE_API_URL=http://localhost:5000/api
volumes:
  db_data: